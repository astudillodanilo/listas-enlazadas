<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Lista Simplemente Enlazada en Python</title>
<desc>Diagrama que muestra la estructura interna de una lista simplemente enlazada y sus operaciones principales</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  text { font-family: sans-serif; fill: #2C2C2A; }
  .th { font-size: 14px; font-weight: 500; fill: #3C3489; }
  .ts { font-size: 12px; fill: #5F5E5A; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
  .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
  .amber-fill { fill: #FAEEDA; stroke: #854F0B; }
  .green-fill { fill: #EAF3DE; stroke: #3B6D11; }
  .red-fill { fill: #FCEBEB; stroke: #A32D2D; }
  .gray-fill { fill: #F1EFE8; stroke: #5F5E5A; }
  .border-rect { fill: none; stroke: #888780; stroke-width: 0.5; }
</style>

<!-- ===== SECCIÓN 1: ESTRUCTURA DEL NODO ===== -->
<text class="th" x="40" y="36" style="font-size:15px;fill:#26215C">Anatomía de un Nodo</text>
<line x1="40" y1="44" x2="240" y2="44" stroke="#B4B2A9" stroke-width="0.5"/>

<rect x="40" y="58" width="110" height="60" rx="8" class="purple-fill" stroke-width="0.5"/>
<text class="th" x="95" y="80" text-anchor="middle" dominant-baseline="central">dato</text>
<text class="ts" x="95" y="100" text-anchor="middle" dominant-baseline="central">self.dato</text>

<rect x="160" y="58" width="110" height="60" rx="8" class="teal-fill" stroke-width="0.5"/>
<text class="th" x="215" y="80" text-anchor="middle" dominant-baseline="central" style="fill:#085041">siguiente</text>
<text class="ts" x="215" y="100" text-anchor="middle" dominant-baseline="central" style="fill:#0F6E56">self.siguiente</text>

<line x1="160" y1="62" x2="160" y2="114" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="ts" x="95" y="138" text-anchor="middle">valor</text>
<text class="ts" x="215" y="138" text-anchor="middle">puntero al sig.</text>

<!-- ===== SECCIÓN 2: LISTA CON 4 NODOS ===== -->
<text class="th" x="40" y="185" style="font-size:15px;fill:#26215C">Lista con 4 nodos encadenados</text>
<line x1="40" y1="193" x2="380" y2="193" stroke="#B4B2A9" stroke-width="0.5"/>

<rect x="40" y="210" width="72" height="32" rx="6" class="amber-fill" stroke-width="0.5"/>
<text class="th" x="76" y="226" text-anchor="middle" dominant-baseline="central" style="fill:#633806">primero</text>
<line x1="112" y1="226" x2="138" y2="226" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr-amber)"/>

<rect x="140" y="210" width="56" height="32" rx="4" class="purple-fill" stroke-width="0.5"/>
<text class="th" x="168" y="226" text-anchor="middle" dominant-baseline="central">10</text>
<rect x="196" y="210" width="32" height="32" rx="4" class="border-rect"/>
<line x1="228" y1="226" x2="248" y2="226" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="250" y="210" width="56" height="32" rx="4" class="purple-fill" stroke-width="0.5"/>
<text class="th" x="278" y="226" text-anchor="middle" dominant-baseline="central">25</text>
<rect x="306" y="210" width="32" height="32" rx="4" class="border-rect"/>
<line x1="338" y1="226" x2="358" y2="226" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="360" y="210" width="56" height="32" rx="4" class="purple-fill" stroke-width="0.5"/>
<text class="th" x="388" y="226" text-anchor="middle" dominant-baseline="central">37</text>
<rect x="416" y="210" width="32" height="32" rx="4" class="border-rect"/>
<line x1="448" y1="226" x2="468" y2="226" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="470" y="210" width="56" height="32" rx="4" class="purple-fill" stroke-width="0.5"/>
<text class="th" x="498" y="226" text-anchor="middle" dominant-baseline="central">52</text>
<rect x="526" y="210" width="40" height="32" rx="4" class="border-rect"/>
<text class="ts" x="546" y="226" text-anchor="middle" dominant-baseline="central">None</text>

<rect x="558" y="210" width="66" height="32" rx="6" class="amber-fill" stroke-width="0.5"/>
<text class="th" x="591" y="226" text-anchor="middle" dominant-baseline="central" style="fill:#633806">ultimo</text>
<line x1="526" y1="236" x2="526" y2="258" stroke="#BA7517" stroke-width="1.5"/>
<line x1="526" y1="258" x2="592" y2="258" stroke="#BA7517" stroke-width="1.5"/>
<line x1="592" y1="258" x2="592" y2="244" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr-amber)"/>

<text class="ts" x="168" y="256" text-anchor="middle" style="fill:#888780">[0]</text>
<text class="ts" x="278" y="256" text-anchor="middle" style="fill:#888780">[1]</text>
<text class="ts" x="388" y="256" text-anchor="middle" style="fill:#888780">[2]</text>
<text class="ts" x="498" y="256" text-anchor="middle" style="fill:#888780">[3]</text>

<!-- ===== SECCIÓN 3: OPERACIONES ===== -->
<text class="th" x="40" y="298" style="font-size:15px;fill:#26215C">Operaciones principales</text>
<line x1="40" y1="306" x2="460" y2="306" stroke="#B4B2A9" stroke-width="0.5"/>

<!-- agregar_ultimo -->
<text class="th" x="40" y="330">agregar_ultimo(99)</text>
<rect x="40" y="342" width="56" height="32" rx="4" class="purple-fill" stroke-width="0.5"/>
<text class="th" x="68" y="358" text-anchor="middle" dominant-baseline="central">52</text>
<rect x="96" y="342" width="32" height="32" rx="4" class="border-rect"/>
<line x1="128" y1="358" x2="148" y2="358" stroke="#3B6D11" stroke-width="1.8" marker-end="url(#arr-green)"/>
<rect x="150" y="342" width="56" height="32" rx="4" class="green-fill" stroke-width="0.5"/>
<text class="th" x="178" y="358" text-anchor="middle" dominant-baseline="central" style="fill:#27500A">99</text>
<rect x="206" y="342" width="44" height="32" rx="4" class="border-rect"/>
<text class="ts" x="228" y="358" text-anchor="middle" dominant-baseline="central">None</text>
<text class="ts" x="178" y="386" text-anchor="middle" style="fill:#3B6D11">nuevo nodo</text>
<text class="ts" x="306" y="350" style="fill:#5F5E5A">ultimo</text>
<text class="ts" x="296" y="366" style="fill:#5F5E5A">apunta aquí</text>
<line x1="300" y1="372" x2="260" y2="372" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arr-amber)"/>

<!-- eliminar_ultimo -->
<text class="th" x="40" y="420">eliminar_ultimo()</text>
<rect x="40" y="432" width="56" height="32" rx="4" class="purple-fill" stroke-width="0.5"/>
<text class="th" x="68" y="448" text-anchor="middle" dominant-baseline="central">37</text>
<rect x="96" y="432" width="32" height="32" rx="4" class="border-rect"/>
<line x1="128" y1="448" x2="148" y2="448" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="150" y="432" width="56" height="32" rx="4" class="purple-fill" stroke-width="0.5"/>
<text class="th" x="178" y="448" text-anchor="middle" dominant-baseline="central">52</text>
<rect x="206" y="432" width="32" height="32" rx="4" class="border-rect"/>
<line x1="238" y1="448" x2="258" y2="448" stroke="#A32D2D" stroke-width="1.8" stroke-dasharray="5 3"/>
<g opacity="0.35">
  <rect x="260" y="432" width="56" height="32" rx="4" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text class="th" x="288" y="448" text-anchor="middle" dominant-baseline="central" style="fill:#791F1F">99</text>
</g>
<line x1="260" y1="432" x2="316" y2="464" stroke="#A32D2D" stroke-width="1.2"/>
<line x1="316" y1="432" x2="260" y2="464" stroke="#A32D2D" stroke-width="1.2"/>
<text class="ts" x="206" y="488" text-anchor="middle" style="fill:#5F5E5A">→ None</text>
<text class="ts" x="68" y="488" text-anchor="middle" style="fill:#5F5E5A">penúltimo</text>
<text class="ts" x="178" y="488" text-anchor="middle" style="fill:#5F5E5A">nuevo último</text>
<text class="ts" x="288" y="488" text-anchor="middle" style="fill:#A32D2D">eliminado</text>

<!-- agregar_inicio -->
<text class="th" x="40" y="520">agregar_inicio(5)</text>
<rect x="40" y="532" width="56" height="32" rx="4" class="green-fill" stroke-width="0.5"/>
<text class="th" x="68" y="548" text-anchor="middle" dominant-baseline="central" style="fill:#27500A">5</text>
<rect x="96" y="532" width="32" height="32" rx="4" class="border-rect"/>
<line x1="128" y1="548" x2="148" y2="548" stroke="#3B6D11" stroke-width="1.8" marker-end="url(#arr-green)"/>
<rect x="150" y="532" width="56" height="32" rx="4" class="purple-fill" stroke-width="0.5"/>
<text class="th" x="178" y="548" text-anchor="middle" dominant-baseline="central">10</text>
<rect x="206" y="532" width="32" height="32" rx="4" class="border-rect"/>
<line x1="238" y1="548" x2="258" y2="548" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="276" y="548" dominant-baseline="central" style="fill:#B4B2A9">...</text>
<text class="ts" x="68" y="578" text-anchor="middle" style="fill:#3B6D11">nuevo primero</text>
<text class="ts" x="178" y="578" text-anchor="middle" style="fill:#5F5E5A">antiguo primero</text>

<!-- recorrido -->
<text class="th" x="40" y="614">recorrido()</text>
<rect x="40" y="626" width="56" height="32" rx="4" class="gray-fill" stroke-width="0.5"/>
<text class="th" x="68" y="642" text-anchor="middle" dominant-baseline="central" style="fill:#2C2C2A">10</text>
<rect x="96" y="626" width="32" height="32" rx="4" class="border-rect"/>
<line x1="128" y1="642" x2="148" y2="642" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="150" y="626" width="56" height="32" rx="4" class="gray-fill" stroke-width="0.5"/>
<text class="th" x="178" y="642" text-anchor="middle" dominant-baseline="central" style="fill:#2C2C2A">25</text>
<rect x="206" y="626" width="32" height="32" rx="4" class="border-rect"/>
<line x1="238" y1="642" x2="258" y2="642" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="260" y="626" width="56" height="32" rx="4" class="gray-fill" stroke-width="0.5"/>
<text class="th" x="288" y="642" text-anchor="middle" dominant-baseline="central" style="fill:#2C2C2A">37</text>
<rect x="316" y="626" width="32" height="32" rx="4" class="border-rect"/>
<line x1="348" y1="642" x2="368" y2="642" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="370" y="626" width="56" height="32" rx="4" class="gray-fill" stroke-width="0.5"/>
<text class="th" x="398" y="642" text-anchor="middle" dominant-baseline="central" style="fill:#2C2C2A">52</text>
<rect x="426" y="626" width="44" height="32" rx="4" class="border-rect"/>
<text class="ts" x="448" y="642" text-anchor="middle" dominant-baseline="central">None</text>
<text class="ts" x="68" y="676" text-anchor="middle" style="fill:#5F5E5A">aux</text>
<line x1="68" y1="668" x2="68" y2="660" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr-purple)"/>
<text class="ts" x="295" y="676" text-anchor="middle" style="fill:#888780">aux avanza con aux = aux.siguiente</text>

<!-- ===== SECCIÓN 4: COMPARATIVA ===== -->
<line x1="40" y1="700" x2="480" y2="700" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th" x="40" y="720" style="font-size:15px;fill:#26215C">Enlazada vs lista Python [ ]</text>

<rect x="40" y="730" width="190" height="28" rx="6" class="gray-fill" stroke-width="0.5"/>
<text class="th" x="135" y="744" text-anchor="middle" dominant-baseline="central" style="fill:#2C2C2A">Lista enlazada</text>
<rect x="244" y="730" width="190" height="28" rx="6" class="gray-fill" stroke-width="0.5"/>
<text class="th" x="339" y="744" text-anchor="middle" dominant-baseline="central" style="fill:#2C2C2A">Lista Python [ ]</text>

<rect x="40" y="758" width="190" height="22" rx="4" class="border-rect"/>
<text class="ts" x="135" y="769" text-anchor="middle" dominant-baseline="central">Insertar inicio: O(1)</text>
<rect x="244" y="758" width="190" height="22" rx="4" class="border-rect"/>
<text class="ts" x="339" y="769" text-anchor="middle" dominant-baseline="central">Insertar inicio: O(n)</text>

<rect x="40" y="780" width="190" height="22" rx="4" class="border-rect"/>
<text class="ts" x="135" y="791" text-anchor="middle" dominant-baseline="central">Acceso por índice: O(n)</text>
<rect x="244" y="780" width="190" height="22" rx="4" class="border-rect"/>
<text class="ts" x="339" y="791" text-anchor="middle" dominant-baseline="central">Acceso por índice: O(1)</text>

<rect x="40" y="802" width="190" height="22" rx="4" class="border-rect"/>
<text class="ts" x="135" y="813" text-anchor="middle" dominant-baseline="central">Memoria dinámica (nodos)</text>
<rect x="244" y="802" width="190" height="22" rx="4" class="border-rect"/>
<text class="ts" x="339" y="813" text-anchor="middle" dominant-baseline="central">Bloque contiguo en RAM</text>
</svg>
